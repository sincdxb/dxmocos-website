
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DXMOCOS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.card{border:1px solid #ddd;padding:10px;border-radius:10px;text-align:center}
.card img{width:100%;border-radius:10px}
button{margin:5px}
</style>
</head>

<body>

<h2>DXMOCOS Products</h2>

<div class="grid">

  <div class="card" data-id="coffee1">
    <img id="img-coffee1" src="Coffee/B09LHVL6W1/01.jpg">
    <p>Coffee Machine</p>
    <button onclick="prev('coffee1')">⬅</button>
    <button onclick="next('coffee1')">➡</button>
  </div>

  <div class="card" data-id="kitchen1">
    <img id="img-kitchen1" src="Kitchen/B08CKTB6Z4/01.jpg">
    <p>Kitchen Tool</p>
    <button onclick="prev('kitchen1')">⬅</button>
    <button onclick="next('kitchen1')">➡</button>
  </div>

  <div class="card" data-id="home1">
    <img id="img-home1" src="Home/B0G9Z319YP/01.jpg">
    <p>Home Product</p>
    <button onclick="prev('home1')">⬅</button>
    <button onclick="next('home1')">➡</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
